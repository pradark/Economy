name: Update gas price HTML

on:
  schedule:
    - cron: "30 13 * * *"  # 13:30 UTC daily (~9:30am ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch FRED data and regenerate index.html
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_gas.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "No changes."
          else
            git add index.html
            git commit -m "chore: daily gas price update"
            git push
          fi
